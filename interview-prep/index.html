  <style>
    :root {
      --bg:            #0b0f1a;
      --surface:       #111827;
      --surface2:      #1a2236;
      --surface3:      #1f2a40;
      --accent:        #4A9EFF;
      --accent-dim:    rgba(74,158,255,0.10);
      --accent-border: rgba(74,158,255,0.22);
      --white:         #e8edf5;
      --muted:         #6b7a99;
      --border-soft:   rgba(255,255,255,0.07);
      --red:           #f85149;
      --yellow:        #f0c14b;
      --green:         #3fb950;
      --font-display:  'Bebas Neue', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --font-mono:     'Share Tech Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.75;
      min-height: 100vh;
    }

    /* ── BACK NAV ── */
    .back-nav {
      max-width: 860px;
      margin: 0 auto;
      padding: 20px 48px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-nav a {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .back-nav a:hover { color: var(--accent); }
    .back-nav-right {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── PAGE WRAP ── */
    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 48px 80px;
    }

    /* ── HERO ── */
    .hero { margin-bottom: 48px; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 20px;
      height: 1px;
      background: var(--accent);
    }
    h1 {
      font-family: var(--font-display);
      font-size: clamp(52px, 7vw, 80px);
      letter-spacing: 3px;
      line-height: 1;
      color: var(--white);
      margin-bottom: 16px;
    }
    h1 span { color: var(--accent); }
    .hero-sub {
      font-size: 18px;
      color: var(--muted);
      max-width: 580px;
      line-height: 1.75;
    }

    /* ── SESSION BAR ── */
    .session-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border: 1px solid var(--border-soft);
      margin-bottom: 32px;
    }
    .session-bar-label {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .session-name-display {
      font-size: 15px;
      font-weight: 500;
      color: var(--white);
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-bar-actions { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }

    /* ── MANAGE DROPDOWN ── */
    .manage-menu-wrap { position: relative; }
    .manage-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--accent-border);
      min-width: 180px;
      z-index: 400;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .manage-menu.open { display: block; }
    .manage-menu-item {
      display: block;
      width: 100%;
      padding: 11px 18px;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      border-bottom: 1px solid var(--border-soft);
    }
    .manage-menu-item:last-child { border-bottom: none; }
    .manage-menu-item:hover { background: var(--surface2); color: var(--accent); }
    .manage-menu-item.danger { color: var(--red); }
    .manage-menu-item.danger:hover { background: rgba(248,81,73,0.08); color: var(--red); }

    /* ── MODE TABS ── */
    .mode-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-soft);
      margin-bottom: 36px;
      gap: 0;
      overflow-x: auto;
    }
    .mode-tab {
      padding: 14px 24px;
      font-family: var(--font-body);
      font-size: 15px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .mode-tab:hover { color: var(--white); }
    .mode-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── SECTION HEADERS ── */
    .section-eyebrow {
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-eyebrow::before { content: ''; display: block; width: 16px; height: 1px; background: var(--accent); }
    .section-title {
      font-family: var(--font-display);
      font-size: clamp(36px, 5vw, 52px);
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 10px;
      word-break: break-word;
    }
    .section-title span { color: var(--accent); }
