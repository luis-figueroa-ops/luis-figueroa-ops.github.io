<html lang="en">
<head>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0d0d18; --accent: #00ffe7; --danger: #ff2d55; --warn: #ffcc00; --text: #e0e0ff; }
  html, body {
    width: 100%; height: 100%; background: #16162a; color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden; user-select: none; touch-action: none; position: fixed;
  }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 100;
  }
  #game-wrapper { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  #hud { display: flex; justify-content: space-between; align-items: center; padding: 0 4px; }
  #hud-left { display: flex; flex-direction: column; gap: 2px; }
  #score-label { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--accent); letter-spacing: 3px; opacity: 0.6; }
  #score { font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
  #hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  #lives-display { display: flex; gap: 6px; }
  .life-pip { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); transition: all 0.2s; }
  .life-pip.dead { background: #333; box-shadow: none; }
  #powerup-bar { display: flex; gap: 8px; align-items: center; height: 18px; }
  .pu-icon { font-size: 15px; opacity: 0.25; transition: all 0.3s; }
  .pu-icon.active { opacity: 1; filter: drop-shadow(0 0 6px currentColor); }
  #canvas { display: block; border: 1px solid #1e2240; box-shadow: 0 0 0 1px #0a0c1a, 0 0 40px rgba(0,255,231,0.08); background: var(--bg); touch-action: none; }
  #canvas-wrap { position: relative; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: rgba(13,13,28,0.96); backdrop-filter: blur(4px); z-index: 10; padding: 16px;
  }
  #overlay.hidden { display: none; }
  .overlay-title {
    font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900;
    letter-spacing: 6px; color: var(--accent);
    text-shadow: 0 0 40px var(--accent), 0 0 80px rgba(0,255,231,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  .overlay-sub { font-size: 12px; color: #aaaacc; letter-spacing: 2px; text-align: center; }
  .overlay-score-label { font-family: 'Orbitron', sans-serif; font-size: 11px; color: #aaaacc; letter-spacing: 3px; margin-top: 6px; }
  .overlay-score-val { font-family: 'Orbitron', sans-serif; font-size: 40px; font-weight: 900; color: var(--warn); text-shadow: 0 0 30px var(--warn); }
  #leaderboard { width: 280px; border-top: 1px solid #2a2a5a; border-bottom: 1px solid #2a2a5a; padding: 8px 0; }
  #leaderboard-title { font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 3px; color: #aaaacc; text-align: center; margin-bottom: 6px; }
  .lb-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 8px; color: #aabbd0; }
  .lb-row.gold { color: var(--warn); text-shadow: 0 0 10px var(--warn); }
  .lb-row.new-entry { color: var(--accent); animation: pulse 1s ease-in-out 3; }
  #start-btn {
    font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 4px; color: var(--bg); background: var(--accent); border: none;
    padding: 14px 36px; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.15s; box-shadow: 0 0 30px rgba(0,255,231,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  #start-btn:active { background: #fff; transform: scale(0.97); }
  #tip, #tip2 { font-size: 11px; color: #aaaacc; letter-spacing: 1px; text-align: center; }
  #tip2 { color: #8888aa; }
  #level-flash {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-family: 'Orbitron', sans-serif; font-size: 18px; font-weight: 900;
    letter-spacing: 4px; color: var(--warn); text-shadow: 0 0 30px var(--warn);
    pointer-events: none; opacity: 0; z-index: 20; white-space: nowrap;
  }
  #level-flash.show { animation: flashIn 1.4s ease forwards; }
  #boss-bar-wrap { width: 100%; height: 7px; background: #111; border: 1px solid #1e2240; display: none; overflow: hidden; }
  #boss-bar-wrap.visible { display: block; }
  #boss-bar { height: 100%; background: var(--danger); box-shadow: 0 0 10px var(--danger); transition: width 0.1s; }
  #boss-label { font-family: 'Orbitron', sans-serif; font-size: 9px; color: var(--danger); letter-spacing: 3px; text-align: center; margin-bottom: 2px; display: none; }
  #boss-label.visible { display: block; }
  @keyframes flashIn {
    0%   { opacity:0; transform:translate(-50%,-50%) scale(0.8); }
    20%  { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
    70%  { opacity:1; transform:translate(-50%,-50%) scale(1); }
    100% { opacity:0; transform:translate(-50%,-50%) scale(1); }
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.7;} }
  #name-input-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #name-input-wrap label { font-size: 12px; color: #aaaacc; letter-spacing: 2px; text-align: center; }
  #player-name {
    font-family: 'Share Tech Mono', monospace; font-size: 16px; background: #111;
    border: 1px solid #2a2a4a; color: var(--accent); padding: 8px 14px;
    text-align: center; letter-spacing: 2px; width: 200px; outline: none;
  }
  #player-name:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,255,231,0.2); }
  #pause-btn {
    font-family: 'Orbitron', sans-serif; font-size: 10px; font-weight: 700;
    letter-spacing: 3px; color: var(--bg); background: var(--accent); border: none;
    padding: 5px 12px; cursor: pointer;
    clip-path: polygon(5px 0%, 100% 0%, calc(100% - 5px) 100%, 0% 100%);
    transition: all 0.15s; box-shadow: 0 0 18px rgba(0,255,231,0.3);
    -webkit-tap-highlight-color: transparent; display: none; white-space: nowrap;
  }
  #pause-btn:active { background: #fff; transform: scale(0.97); }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div id="hud-left">
      <div id="score-label">SCORE</div>
      <div id="score">0</div>
    </div>
    <div id="hud-right">
      <div style="display:flex;align-items:center;gap:10px;">
        <button id="pause-btn">⏸ PAUSE</button>
        <div id="lives-display">
          <div class="life-pip" id="pip1"></div>
          <div class="life-pip" id="pip2"></div>
          <div class="life-pip" id="pip3"></div>
        </div>
      </div>
      <div id="powerup-bar">
        <span class="pu-icon" id="pu-shield">🛡️</span>
        <span class="pu-icon" id="pu-slow">⏱️</span>
      </div>
    </div>
  </div>
  <div id="boss-label">⚠ BOSS WAVE</div>
  <div id="boss-bar-wrap"><div id="boss-bar" style="width:100%"></div></div>
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlay-title">DODGE</div>
      <div class="overlay-sub" id="overlay-sub">SURVIVE THE GRID</div>
      <div class="overlay-score-label" id="overlay-score-label" style="display:none">FINAL SCORE</div>
      <div class="overlay-score-val" id="overlay-score-val" style="display:none">0</div>
      <div id="name-input-wrap">
        <label>ENTER YOUR NAME TO TRACK SCORES</label>
        <input id="player-name" maxlength="12" placeholder="PILOT" autocomplete="off" spellcheck="false"/>
      </div>
      <div id="leaderboard" style="display:none">
        <div id="leaderboard-title">TOP SCORES</div>
        <div id="lb-rows"></div>
      </div>
      <button id="start-btn">PLAY</button>
      <div id="tip">MOUSE, ARROW KEYS, or DRAG to move</div>
      <div id="tip2">🛡️ SHIELD - blocks one hit &nbsp;|&nbsp; ⏱️ SLOW-MO - halves speed</div>
    </div>
    <div id="level-flash"></div>
  </div>
</div>

<script>
// ─── Fixed internal game resolution ───────────────────────────────────────────
const GW = 480, GH = 580;

// ─── Device detection ─────────────────────────────────────────────────────────
// pointer:coarse = touch primary device. pointer:fine = mouse primary device.
const isMobile = window.matchMedia('(pointer: coarse)').matches;

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const wrapper = document.getElementById('game-wrapper');
const hudEl   = document.getElementById('hud');
const bbWrap  = document.getElementById('boss-bar-wrap');

canvas.width  = GW;
canvas.height = GH;

// cssToGame: how many game pixels per CSS pixel (inverse of visual scale)
// Used to convert touch deltas correctly
let cssToGame = 1;

function resize() {
  const availW = window.innerWidth  - 4;
  const availH = window.innerHeight - 4;
  const extraH = 70;

  // Calculate what scale would be needed to fit
  const fitScale = Math.min(availW / GW, (availH - extraH) / GH);

  // Desktop (mouse): never scale below 1, never scale at all
  // Mobile (touch): scale to fit screen
  const scale = isMobile ? fitScale : 1;

  const cw = Math.floor(GW * scale);
  const ch = Math.floor(GH * scale);

  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  hudEl.style.width   = cw + 'px';
  bbWrap.style.width  = cw + 'px';
  wrapper.style.width = cw + 'px';

  // cssToGame = game pixels per CSS pixel
  // e.g. if scale=0.7, canvas is 336 CSS px wide for 480 game px => 480/336 = 1.43 game px per CSS px
  cssToGame = GW / cw;
}
resize();
window.addEventListener('resize', () => { if (!touchInProgress) resize(); });

// Convert screen clientX/Y to internal game coordinates
function screenToGame(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (clientX - r.left) * (GW / r.width),
    y: (clientY - r.top)  * (GH / r.height)
  };
}

// ─── Audio ────────────────────────────────────────────────────────────────────
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, dur, vol, freqEnd) {
  try {
    const ac = getAudio(), osc = ac.createOscillator(), g = ac.createGain();
    osc.connect(g); g.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + dur);
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(); osc.stop(ac.currentTime + dur);
  } catch(e) {}
}
// Play a burst of filtered white noise — the foundation of good space SFX
function playNoise(dur, vol, filterType, filterFreqStart, filterFreqEnd, pitchLFOrate) {
  try {
    const ac = getAudio();
    const bufLen = ac.sampleRate * dur;
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf;
    const filt = ac.createBiquadFilter();
    filt.type = filterType;
    filt.frequency.setValueAtTime(filterFreqStart, ac.currentTime);
    if (filterFreqEnd) filt.frequency.exponentialRampToValueAtTime(filterFreqEnd, ac.currentTime + dur);
    filt.Q.value = 1.2;
    const g = ac.createGain();
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    src.connect(filt); filt.connect(g); g.connect(ac.destination);
    src.start(); src.stop(ac.currentTime + dur);
  } catch(e) {}
}

const SFX = {
  hit:     () => playTone(200,'sawtooth',0.25,0.3,30),
  die:     () => { playTone(300,'sawtooth',0.6,0.4,20); playTone(150,'square',0.4,0.2,40); },
  powerup: () => { playTone(440,'sine',0.08,0.2); playTone(660,'sine',0.12,0.2); playTone(880,'sine',0.18,0.2); },
  shield:  () => playTone(600,'sine',0.15,0.25,900),
  levelup: () => {
    // Warp jump: deep sine thump + noise whoosh sweep upward
    playTone(55,'sine',0.5,0.18,80);
    playNoise(0.6, 0.12, 'bandpass', 300, 4000);
    playTone(880,'sine',0.4,0.06,1760);
  },
  boss:    () => { playTone(80,'sawtooth',0.8,0.35,60); playTone(60,'square',0.5,0.2,50); },
  bossdie: () => { playTone(500,'sawtooth',0.05,0.3); playTone(400,'sawtooth',0.05,0.3); playTone(300,'sawtooth',0.05,0.3); playTone(200,'sawtooth',0.4,0.3,50); },
  dodge:   () => { if (Math.random()>0.94) playTone(880,'sine',0.04,0.05,1200); },
  // Near-miss: short noise burst filtered high→low, like something flying past
  whoosh:  () => playNoise(0.18, 0.08, 'bandpass', 3000, 400),
  // Keyboard thrust: very brief low-filtered noise puff
  thruster: () => playNoise(0.1, 0.05, 'lowpass', 280, 120)
};

// ─── Space ambient engine hum (filtered noise, not oscillators) ───────────────
let _engineHumNode = null, _engineHumGain = null;
function startEngineHum() {
  try {
    if (_engineHumNode) return;
    const ac = getAudio();
    // Looping white noise through a tight lowpass = smooth deep rumble
    const bufLen = ac.sampleRate * 2;
    const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;
    const src = ac.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 120; filt.Q.value = 0.8;
    // Slow LFO on filter cutoff gives breathing movement
    const lfo = ac.createOscillator(), lfoGain = ac.createGain();
    lfo.frequency.value = 0.3; lfoGain.gain.value = 30;
    lfo.connect(lfoGain); lfoGain.connect(filt.frequency);
    const g = ac.createGain();
    g.gain.value = 0;
    src.connect(filt); filt.connect(g); g.connect(ac.destination);
    g.gain.linearRampToValueAtTime(0.25, ac.currentTime + 1.2);
    lfo.start(); src.start();
    _engineHumNode = [src, lfo];
    _engineHumGain = g;
  } catch(e) {}
}
function stopEngineHum() {
  try {
    if (!_engineHumNode || !_engineHumGain) return;
    const ac = getAudio();
    _engineHumGain.gain.setValueAtTime(_engineHumGain.gain.value, ac.currentTime);
    _engineHumGain.gain.linearRampToValueAtTime(0.0001, ac.currentTime + 0.8);
    const nodes = _engineHumNode;
    setTimeout(() => { nodes.forEach(n => { try { n.stop(); } catch(e) {} }); }, 900);
    _engineHumNode = null; _engineHumGain = null;
  } catch(e) {}
}
function setEngineHumSlowmo(slow) {
  try {
    if (!_engineHumGain) return;
    const ac = getAudio();
    _engineHumGain.gain.setValueAtTime(_engineHumGain.gain.value, ac.currentTime);
    _engineHumGain.gain.linearRampToValueAtTime(slow ? 0.1 : 0.25, ac.currentTime + 0.4);
  } catch(e) {}
}

// ─── Leaderboard ──────────────────────────────────────────────────────────────
const LB_KEY = 'dodge_leaderboard_v1';
function loadLB() { try { return JSON.parse(localStorage.getItem(LB_KEY))||[]; } catch(e) { return []; } }
function saveLB(e) { try { localStorage.setItem(LB_KEY,JSON.stringify(e)); } catch(e) {} }
function addToLB(name, sc) {
  const entries = loadLB();
  entries.push({ name:(name||'PILOT').toUpperCase().slice(0,12), score:sc });
  entries.sort((a,b)=>b.score-a.score);
  const t = entries.slice(0,8); saveLB(t); return t;
}
function renderLB(entries, newScore) {
  const c = document.getElementById('lb-rows');
  c.innerHTML = '';
  entries.forEach((e,i) => {
    const row = document.createElement('div');
    row.className = 'lb-row'+(i===0?' gold':'')+(e.score===newScore&&i===entries.findIndex(x=>x.score===newScore)?' new-entry':'');
    row.innerHTML = `<span>${i+1}. ${e.name}</span><span>${e.score}</span>`;
    c.appendChild(row);
  });
}

// ─── Game state ───────────────────────────────────────────────────────────────
const W = GW, H = GH;
let state    = 'idle';
let score    = 0, lives = 3, frame = 0, animId = null, lastLevel = 1;
const P      = { x:W/2, y:H-80, w:28, h:16, speed:5 };

// Mouse
let mx = W/2, my = H-80, mouseMoved = false;

// Touch — store whether finger is down; position set directly each touchmove
let touchActive = false;

// Block resize from firing while finger is on screen (prevents canvasScale changing mid-drag)
let touchInProgress = false;

let keys = {};
let paused = false;
const pauseBtn = document.getElementById('pause-btn');

function togglePause() {
  if (state !== 'playing') return;
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
  try {
    if (audioCtx) { if (paused) audioCtx.suspend(); else audioCtx.resume(); }
  } catch(e) {}
}

pauseBtn.addEventListener('click', togglePause);

let shieldActive = false, shieldTimer = 0;
let slowActive   = false, slowTimer   = 0;
let powerups = [], obstacles = [];

// Score per level threshold — raised to 600 so each level takes ~10 seconds at 60fps
const SCORE_PER_LEVEL = 600;
let baseSpeed = 1.6, spawnRate = 52;
let bossActive = false, boss = null, bossHP = 0, bossMaxHP = 0, bossWaveLevel = 0;
let particles = [];
let stars = Array.from({length:60}, () => ({
  x:Math.random()*W, y:Math.random()*H,
  r:Math.random()*1.5+0.3, s:Math.random()*0.4+0.1
}));
let gridOffset = 0;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getLevel()         { return Math.floor(score/SCORE_PER_LEVEL)+1; }
function getSpeedMult()     { return slowActive ? 0.45 : 1; }
function getObstacleSpeed() { return (baseSpeed+(getLevel()-1)*0.4)*getSpeedMult(); }
function getSpawnRate()     { return Math.max(18, spawnRate-(getLevel()-1)*3); }
function isBossLevel(l)     { return l>=6 && (l-6)%4===0; }

// ─── Mouse input ──────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  if (isMobile) return;
  const p = screenToGame(e.clientX, e.clientY);
  if (Math.abs(p.x-mx)>1 || Math.abs(p.y-my)>1) { mx=p.x; my=p.y; mouseMoved=true; }
});
canvas.addEventListener('mouseleave', () => { mouseMoved = false; });

// ─── Keyboard input ───────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === ' ') { e.preventDefault(); togglePause(); return; }
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ─── Touch input ──────────────────────────────────────────────────────────────
// Finger position stored in game coords. Ship moves toward it each frame in the
// game loop, capped at the same rate as desktop: Math.min(dist, P.speed * 1.4)
let touchTargetX = 0, touchTargetY = 0;

if (isMobile) {
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    touchInProgress = true;
    if (state !== 'playing') return;
    const pos = screenToGame(e.touches[0].clientX, e.touches[0].clientY);
    // Only set the target — never teleport the ship directly
    touchTargetX = pos.x;
    touchTargetY = pos.y;
    touchActive = true;
    mouseMoved  = false;
  }, { passive: false });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (state !== 'playing' || !touchActive) return;
    const raw = e.touches[0];
    const pos = screenToGame(raw.clientX, raw.clientY);
    const dx = pos.x - P.x, dy = pos.y - P.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const movePx = Math.min(dist, P.speed * 0.8);
    console.log('[touch] raw=(' + raw.clientX.toFixed(1) + ',' + raw.clientY.toFixed(1) + ')'
      + ' game=(' + pos.x.toFixed(1) + ',' + pos.y.toFixed(1) + ')'
      + ' ship=(' + P.x.toFixed(1) + ',' + P.y.toFixed(1) + ')'
      + ' dist=' + dist.toFixed(1)
      + ' movePx=' + movePx.toFixed(2));
    touchTargetX = pos.x;
    touchTargetY = pos.y;
  }, { passive: false });

  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    touchActive = false;
    touchInProgress = false;
  }, { passive: false });

  canvas.addEventListener('touchcancel', e => {
    e.preventDefault();
    touchActive = false;
    touchInProgress = false;
  }, { passive: false });
}

// ─── Buttons ──────────────────────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('player-name').addEventListener('keydown', e => { if(e.key==='Enter') startGame(); });

// ─── Game functions ───────────────────────────────────────────────────────────
function startGame() {
  score=0; lives=3; frame=0; lastLevel=1;
  obstacles=[]; particles=[]; powerups=[];
  shieldActive=false; shieldTimer=0; slowActive=false; slowTimer=0;
  bossActive=false; boss=null; bossWaveLevel=0;
  P.x=W/2; P.y=H-80; mx=W/2; my=H-80; mouseMoved=false;
  touchActive=false; touchInProgress=false; touchTargetX=W/2; touchTargetY=H-80;
  document.getElementById('boss-bar-wrap').classList.remove('visible');
  document.getElementById('boss-label').classList.remove('visible');
  document.getElementById('overlay-title').textContent='DODGE';
  document.getElementById('overlay-title').style.color='var(--accent)';
  document.getElementById('overlay-title').style.textShadow='0 0 40px var(--accent), 0 0 80px rgba(0,255,231,0.3)';
  document.getElementById('overlay-score-label').style.display='none';
  document.getElementById('overlay-score-val').style.display='none';
  paused=false; pauseBtn.style.display='block'; pauseBtn.textContent='⏸ PAUSE';
  updateHUD(); updatePowerupUI();
  document.getElementById('overlay').classList.add('hidden');
  state='playing';
  if (animId) cancelAnimationFrame(animId);
  startEngineHum();
  loop();
}

function updateHUD() {
  document.getElementById('score').textContent = score;
  ['pip1','pip2','pip3'].forEach((id,i) => document.getElementById(id).classList.toggle('dead', i>=lives));
}
function updatePowerupUI() {
  document.getElementById('pu-shield').classList.toggle('active', shieldActive);
  document.getElementById('pu-slow').classList.toggle('active', slowActive);
}
function showLevelFlash(text, color) {
  const el = document.getElementById('level-flash');
  el.textContent=text; el.style.color=color||'var(--warn)';
  el.style.textShadow=`0 0 30px ${color||'var(--warn)'}`;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}
function spawnObstacle() {
  const types=['rect','diamond','bar'];
  const t=types[Math.floor(Math.random()*types.length)];
  const w=t==='bar'?(60+Math.random()*80):(18+Math.random()*22);
  const h=t==='bar'?12:(18+Math.random()*22);
  const x = Math.random()<0.33
    ? Math.max(10, Math.min(W-w-10, P.x - w/2))
    : Math.random()*(W-w-20)+10;
  obstacles.push({ x, y:-h-10, w, h, type:t,
    speed:getObstacleSpeed()*(0.85+Math.random()*0.4), hue:Math.random()>0.3?0:45 });
}
function spawnPowerup(x, y) {
  powerups.push({ x, y, type:Math.random()>0.5?'shield':'slow', vy:1.2, life:420, r:14 });
}
function spawnParticles(x, y, color, n=12) {
  for (let i=0;i<n;i++) {
    const a=(Math.PI*2*i)/n+Math.random()*0.4, spd=2+Math.random()*4;
    particles.push({ x,y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      life:1, decay:0.04+Math.random()*0.04, r:2+Math.random()*3, color });
  }
}
function getBossWaveNum(l) { return Math.floor((l-6)/4)+1; }
function spawnBoss(level) {
  bossActive=true;
  const wn=getBossWaveNum(level);
  bossHP=bossMaxHP=6+wn*3;
  boss={ x:W/2-40,y:60,w:80+wn*6,h:30+wn*4,vx:1.8+wn*0.9,vy:0,
         phase:0,shootTimer:0,waveNum:wn,projectiles:[] };
  document.getElementById('boss-bar-wrap').classList.add('visible');
  document.getElementById('boss-label').classList.add('visible');
  document.getElementById('boss-label').textContent = wn>=3?`⚠ BOSS WAVE ${wn} — ELITE`:`⚠ BOSS WAVE ${wn}`;
  SFX.boss(); showLevelFlash(wn>=3?'ELITE BOSS!':`BOSS WAVE ${wn}!`,'#ff2d55');
}
function updateBoss() {
  if (!boss) return;
  boss.x += boss.vx*getSpeedMult();
  if (boss.x<=0||boss.x+boss.w>=W){boss.vx*=-1;boss.x=Math.max(0,Math.min(W-boss.w,boss.x));}
  boss.phase+=0.03; boss.y=60+Math.sin(boss.phase)*20;
  boss.shootTimer++;
  const wn=boss.waveNum||1, si=Math.max(20,60-wn*8);
  if (boss.shootTimer>=si) {
    boss.shootTimer=0;
    const cx=boss.x+boss.w/2, ns=Math.min(5,1+wn), sp=0.28;
    const angles=Array.from({length:ns},(_,i)=>Math.PI/2+(i-(ns-1)/2)*sp);
    const ps=(2.5+wn*0.6)*getSpeedMult();
    angles.forEach(a=>boss.projectiles.push({x:cx,y:boss.y+boss.h,vx:Math.cos(a)*ps*0.4,vy:Math.sin(a)*ps,r:7}));
  }
  boss.projectiles=boss.projectiles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(state==='playing'){const dx=p.x-P.x,dy=p.y-P.y;if(Math.sqrt(dx*dx+dy*dy)<p.r+8){handlePlayerHit();return false;}}
    return p.y<H+20;
  });
  document.getElementById('boss-bar').style.width=(bossHP/bossMaxHP*100)+'%';
  if(state==='playing'&&P.x+P.w/2>boss.x&&P.x-P.w/2<boss.x+boss.w&&P.y+P.h/2>boss.y&&P.y-P.h/2<boss.y+boss.h) handlePlayerHit();
}
function drawBoss() {
  if (!boss) return;
  ctx.fillStyle=`rgba(255,45,85,${0.75+Math.sin(frame*0.12)*0.25})`; ctx.shadowColor='#ff2d55'; ctx.shadowBlur=20;
  ctx.fillRect(boss.x,boss.y,boss.w,boss.h);
  ctx.fillStyle='#fff'; ctx.shadowBlur=8;
  ctx.beginPath();ctx.arc(boss.x+boss.w/2,boss.y+boss.h/2,8,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff2d55';
  ctx.beginPath();ctx.arc(boss.x+boss.w/2,boss.y+boss.h/2,4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  boss.projectiles.forEach(p=>{
    ctx.fillStyle='#ff8c00';ctx.shadowColor='#ff8c00';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });
}
function checkAABB(ax,ay,aw,ah,bx,by,bw,bh){return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;}
function handlePlayerHit() {
  if(shieldActive){shieldActive=false;shieldTimer=0;updatePowerupUI();SFX.shield();spawnParticles(P.x,P.y,'#4488ff',20);return;}
  lives--; SFX.hit(); spawnParticles(P.x,P.y,'#ff2d55',16); updateHUD();
  if(lives<=0){state='dead';SFX.die();stopEngineHum();spawnParticles(P.x,P.y,'#ff2d55',35);setTimeout(showGameOver,800);}
}
function checkPickup(pu){const dx=pu.x-P.x,dy=pu.y-P.y;return Math.sqrt(dx*dx+dy*dy)<pu.r+16;}

// ─── Main loop ────────────────────────────────────────────────────────────────
let _lastLoopTs = 0;
function loop(ts) {
  animId = requestAnimationFrame(loop);
  if (ts - _lastLoopTs < 14) return;
  _lastLoopTs = ts;

  if (paused) {
    // Draw pause overlay on top of last frame
    ctx.fillStyle = 'rgba(13,13,28,0.72)';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.font = "900 30px 'Orbitron', sans-serif";
    ctx.fillStyle = '#00ffe7';
    ctx.shadowColor = '#00ffe7'; ctx.shadowBlur = 30;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('PAUSED', W/2, H/2);
    ctx.shadowBlur = 0;
    ctx.font = "11px 'Share Tech Mono', monospace";
    ctx.fillStyle = '#aaaacc';
    ctx.letterSpacing = '2px';
    ctx.fillText('SPACE / ⏸ TO RESUME', W/2, H/2 + 38);
    ctx.restore();
    return;
  }

  frame++;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H);
  if(!paused) gridOffset=(gridOffset+getObstacleSpeed()*0.3)%40;
  ctx.strokeStyle=slowActive?'#0e1a1a':'#12121e'; ctx.lineWidth=1;
  for(let y=-40+gridOffset;y<H+40;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  if(slowActive){ctx.fillStyle='rgba(80,0,180,0.06)';ctx.fillRect(0,0,W,H);}
  stars.forEach(s=>{
    if(!paused){s.y+=s.s*(slowActive?0.3:1); if(s.y>H){s.y=-2;s.x=Math.random()*W;}}
    ctx.fillStyle=`rgba(200,200,255,${0.3+s.r*0.2})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });

  if (state==='playing' && !paused) {
    if(shieldTimer>0){shieldTimer--;if(shieldTimer===0){shieldActive=false;updatePowerupUI();setEngineHumSlowmo(false);}}
    if(slowTimer>0){slowTimer--;if(slowTimer===0){slowActive=false;updatePowerupUI();setEngineHumSlowmo(false);}}

    const anyKey=keys['ArrowLeft']||keys['ArrowRight']||keys['ArrowUp']||keys['ArrowDown']
               ||keys['a']||keys['d']||keys['w']||keys['s'];
    if (anyKey) {
      if(keys['ArrowLeft'] ||keys['a']) P.x-=P.speed;
      if(keys['ArrowRight']||keys['d']) P.x+=P.speed;
      if(keys['ArrowUp']   ||keys['w']) P.y-=P.speed;
      if(keys['ArrowDown'] ||keys['s']) P.y+=P.speed;
      mx=P.x; my=P.y;
      if(frame%12===0) SFX.thruster();
    } else if (!isMobile && mouseMoved) {
      const dx=mx-P.x, dy=my-P.y, dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>1){P.x+=(dx/dist)*Math.min(dist,P.speed*6);P.y+=(dy/dist)*Math.min(dist,P.speed*6);}
    } else if (isMobile && touchActive) {
      P.x = touchTargetX;
      P.y = touchTargetY;
    }
    // Touch movement handled directly in touchmove (delta in screen px / canvasScale)
    mouseMoved=false;

    P.x=Math.max(P.w/2,Math.min(W-P.w/2,P.x));
    P.y=Math.max(P.h/2,Math.min(H-P.h/2,P.y));

    if(frame%getSpawnRate()===0) spawnObstacle();
    score++; updateHUD(); SFX.dodge();
    const lvl=getLevel();
    if(lvl>lastLevel){
      lastLevel=lvl;
      if(isBossLevel(lvl)&&!bossActive) spawnBoss(lvl);
      else { SFX.levelup(); showLevelFlash(`LEVEL ${lvl}`,'#ffcc00'); }
    }
    if(bossActive&&boss) updateBoss();
  }

  obstacles=obstacles.filter(obs=>{
    if(!paused) obs.y+=obs.speed*getSpeedMult();
    ctx.shadowBlur=12;
    if(obs.hue===0){ctx.fillStyle='rgba(255,45,85,0.9)';ctx.shadowColor='#ff2d55';}
    else{ctx.fillStyle='rgba(255,200,0,0.9)';ctx.shadowColor='#ffcc00';}
    if(obs.type==='diamond'){
      ctx.save();ctx.translate(obs.x+obs.w/2,obs.y+obs.h/2);ctx.rotate(Math.PI/4);
      ctx.fillRect(-obs.w*0.35,-obs.h*0.35,obs.w*0.7,obs.h*0.7);ctx.restore();
    } else { ctx.fillRect(obs.x,obs.y,obs.w,obs.h); }
    ctx.shadowBlur=0;
    const pw=P.w*0.7, ph=P.h*0.7;
    if(!paused&&state==='playing'&&checkAABB(P.x-pw/2,P.y-ph/2,pw,ph,obs.x,obs.y,obs.w,obs.h)){handlePlayerHit();return false;}
    // Near-miss whoosh: obstacle just passed the ship's row and was close horizontally
    if(!paused&&state==='playing'&&obs.y>P.y&&obs.y-obs.speed*getSpeedMult()<=P.y){
      const nearX=Math.abs((obs.x+obs.w/2)-P.x)<60;
      if(nearX) SFX.whoosh();
    }
    return obs.y<H+20;
  });
  if(bossActive&&boss) drawBoss();

  powerups=powerups.filter(pu=>{
    if(!paused){pu.y+=pu.vy; pu.life--;}
    const alpha=Math.min(1,pu.life/60), col=pu.type==='shield'?'#4488ff':'#aa44ff';
    ctx.shadowColor=col;ctx.shadowBlur=14;ctx.strokeStyle=col;ctx.lineWidth=2;ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(pu.x,pu.y,pu.r,0,Math.PI*2);ctx.stroke();
    ctx.font='14px serif';ctx.fillStyle=col;ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pu.type==='shield'?'🛡️':'⏱️',pu.x,pu.y);
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    if(!paused&&state==='playing'&&checkPickup(pu)){
      SFX.powerup();
      if(pu.type==='shield'){shieldActive=true;shieldTimer=600;}else{slowActive=true;slowTimer=480;setEngineHumSlowmo(true);}
      updatePowerupUI();spawnParticles(pu.x,pu.y,col,14);showLevelFlash(pu.type==='shield'?'SHIELD!':'SLOW-MO!',col);
      return false;
    }
    return pu.life>0&&pu.y<H+20;
  });

  particles=particles.filter(p=>{
    if(!paused){p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.decay;}
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1; return p.life>0;
  });

  if(state!=='dead'||frame%6<4){
    const px=P.x,py=P.y;
    if(shieldActive){
      ctx.strokeStyle=`rgba(68,136,255,${0.5+Math.sin(frame*0.15)*0.3})`;ctx.lineWidth=2;
      ctx.shadowColor='#4488ff';ctx.shadowBlur=20;
      ctx.beginPath();ctx.arc(px,py,26,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
    }
    ctx.shadowColor='#00ffe7';ctx.shadowBlur=20;ctx.fillStyle='#00ffe7';
    ctx.beginPath();
    ctx.moveTo(px,py-P.h/2-4); ctx.lineTo(px-P.w/2,py+P.h/2);
    ctx.lineTo(px-P.w/4,py+P.h/4); ctx.lineTo(px,py+P.h/2-6);
    ctx.lineTo(px+P.w/4,py+P.h/4); ctx.lineTo(px+P.w/2,py+P.h/2);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.shadowBlur=8;
    ctx.beginPath();ctx.ellipse(px,py-2,4,6,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(0,255,231,${0.3+Math.sin(frame*0.3)*0.2})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(px-5,py+P.h/2);ctx.lineTo(px,py+P.h/2+6+Math.sin(frame*0.5)*4);ctx.lineTo(px+5,py+P.h/2);ctx.stroke();
  }

  // Mouse cursor — desktop only
  if(state==='playing'&&!isMobile){
    ctx.strokeStyle='rgba(0,255,231,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(mx,my,10,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(0,255,231,0.8)';
    ctx.beginPath();ctx.arc(mx,my,2,0,Math.PI*2);ctx.fill();
  }
}

function showGameOver() {
  paused=false; pauseBtn.style.display='none';
  const playerName=document.getElementById('player-name').value||'PILOT';
  try{localStorage.setItem('dodge_pilot_name',playerName);}catch(e){}
  const entries=addToLB(playerName,score);
  document.getElementById('overlay-title').textContent='GAME OVER';
  document.getElementById('overlay-title').style.color='#ff2d55';
  document.getElementById('overlay-title').style.textShadow='0 0 40px #ff2d55';
  document.getElementById('overlay-sub').textContent='YOUR SHIP WAS DESTROYED';
  document.getElementById('overlay-score-label').style.display='block';
  document.getElementById('overlay-score-val').style.display='block';
  document.getElementById('overlay-score-val').textContent=score;
  document.getElementById('name-input-wrap').style.display='flex';
  document.getElementById('leaderboard').style.display='block';
  document.getElementById('start-btn').textContent='PLAY AGAIN';
  renderLB(entries,score);
  document.getElementById('overlay').classList.remove('hidden');
}

let _lastIdleTs = 0;
function idleLoop(ts) {
  if(state!=='idle') return;
  if (ts - _lastIdleTs < 14) { requestAnimationFrame(idleLoop); return; }
  _lastIdleTs = ts;
  ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#12121e';ctx.lineWidth=1;
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  stars.forEach(s=>{
    s.y+=s.s*0.5;if(s.y>H){s.y=-2;s.x=Math.random()*W;}
    ctx.fillStyle=`rgba(200,200,255,${0.3+s.r*0.2})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(idleLoop);
}
idleLoop();

try{const s=localStorage.getItem('dodge_pilot_name');if(s)document.getElementById('player-name').value=s;}catch(e){}
const existing=loadLB();
if(existing.length>0){document.getElementById('leaderboard').style.display='block';renderLB(existing,-1);}
</script>
