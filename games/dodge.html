<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DODGE — Stress Break</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d18; --accent: #00ffe7; --danger: #ff2d55;
    --warn: #ffcc00; --shield: #4488ff; --slow: #aa44ff; --text: #e0e0ff;
  }
  body {
    background: #16162a; color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; overflow: hidden; user-select: none;
  }
  body::after {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    pointer-events: none; z-index: 100;
  }
  #game-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  #hud {
    display: flex; justify-content: space-between; align-items: center;
    width: 480px; padding: 0 4px;
  }
  #hud-left { display: flex; flex-direction: column; gap: 2px; }
  #score-label { font-family: 'Orbitron', sans-serif; font-size: 10px; color: var(--accent); letter-spacing: 3px; opacity: 0.6; }
  #score { font-family: 'Orbitron', sans-serif; font-size: 26px; font-weight: 700; color: var(--accent); text-shadow: 0 0 20px var(--accent); }
  #hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  #lives-display { display: flex; gap: 6px; }
  .life-pip { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); box-shadow: 0 0 8px var(--danger); transition: all 0.2s; }
  .life-pip.dead { background: #333; box-shadow: none; }
  #powerup-bar { display: flex; gap: 8px; align-items: center; height: 18px; }
  .pu-icon { font-size: 16px; opacity: 0.25; transition: all 0.3s; }
  .pu-icon.active { opacity: 1; filter: drop-shadow(0 0 6px currentColor); }
  #canvas { display: block; border: 1px solid #1e2240; box-shadow: 0 0 0 1px #0a0c1a, 0 0 40px rgba(0,255,231,0.08); background: var(--bg); cursor: none; }
  #overlay {
    position: absolute; top: 0; left: 0; width: 480px; height: 580px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    background: rgba(13,13,28,0.96); backdrop-filter: blur(4px); z-index: 10;
  }
  #overlay.hidden { display: none; }
  .overlay-title {
    font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 900;
    letter-spacing: 6px; color: var(--accent);
    text-shadow: 0 0 40px var(--accent), 0 0 80px rgba(0,255,231,0.3);
    animation: pulse 2s ease-in-out infinite;
  }
  .overlay-sub { font-size: 13px; color: #aaaacc; letter-spacing: 2px; }
  .overlay-score-label { font-family: 'Orbitron', sans-serif; font-size: 12px; color: #aaaacc; letter-spacing: 3px; margin-top: 8px; }
  .overlay-score-val { font-family: 'Orbitron', sans-serif; font-size: 46px; font-weight: 900; color: var(--warn); text-shadow: 0 0 30px var(--warn); }
  #leaderboard { width: 300px; border-top: 1px solid #2a2a5a; border-bottom: 1px solid #2a2a5a; padding: 10px 0; margin: 0; }
  #leaderboard-title { font-family: 'Orbitron', sans-serif; font-size: 11px; letter-spacing: 3px; color: #aaaacc; text-align: center; margin-bottom: 8px; }
  .lb-row { display: flex; justify-content: space-between; font-size: 13px; padding: 3px 8px; color: #aabbd0; }
  .lb-row.gold { color: var(--warn); text-shadow: 0 0 10px var(--warn); }
  .lb-row.new-entry { color: var(--accent); animation: pulse 1s ease-in-out 3; }
  #start-btn {
    font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 4px; color: var(--bg); background: var(--accent); border: none;
    padding: 13px 34px; cursor: pointer;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
    transition: all 0.15s; box-shadow: 0 0 30px rgba(0,255,231,0.4);
  }
  #start-btn:hover { background: #fff; box-shadow: 0 0 50px rgba(0,255,231,0.8); transform: scale(1.05); }
  #tip { font-size: 12px; color: #aaaacc; letter-spacing: 1px; }
  #tip2 { font-size: 12px; color: #8888aa; letter-spacing: 1px; }
  #level-flash {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Orbitron', sans-serif; font-size: 20px; font-weight: 900;
    letter-spacing: 4px; color: var(--warn); text-shadow: 0 0 30px var(--warn);
    pointer-events: none; opacity: 0; z-index: 20; white-space: nowrap;
  }
  #level-flash.show { animation: flashIn 1.4s ease forwards; }
  #boss-bar-wrap {
    width: 480px; height: 8px; background: #111; border: 1px solid #1e2240;
    display: none; position: relative; overflow: hidden;
  }
  #boss-bar-wrap.visible { display: block; }
  #boss-bar { height: 100%; background: var(--danger); box-shadow: 0 0 10px var(--danger); transition: width 0.1s; }
  #boss-label { font-family: 'Orbitron', sans-serif; font-size: 9px; color: var(--danger); letter-spacing: 3px; text-align: center; margin-bottom: 2px; display: none; }
  #boss-label.visible { display: block; }
  @keyframes flashIn {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
    20%  { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
    70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1); }
  }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.7; } }
  #name-input-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #name-input-wrap label { font-size: 13px; color: #aaaacc; letter-spacing: 2px; }
  #player-name {
    font-family: 'Share Tech Mono', monospace; font-size: 16px; background: #111;
    border: 1px solid #2a2a4a; color: var(--accent); padding: 8px 14px;
    text-align: center; letter-spacing: 2px; width: 200px; outline: none;
  }
  #player-name:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(0,255,231,0.2); }
</style>
</head>
<body>
<div id="game-wrapper">
  <div id="hud">
    <div id="hud-left">
      <div id="score-label">SCORE</div>
      <div id="score">0</div>
    </div>
    <div id="hud-right">
      <div id="lives-display">
        <div class="life-pip" id="pip1"></div>
        <div class="life-pip" id="pip2"></div>
        <div class="life-pip" id="pip3"></div>
      </div>
      <div id="powerup-bar">
        <span class="pu-icon" id="pu-shield" title="Shield">🛡️</span>
        <span class="pu-icon" id="pu-slow" title="Slow-Mo">⏱️</span>
      </div>
    </div>
  </div>

  <div id="boss-label">⚠ BOSS WAVE</div>
  <div id="boss-bar-wrap"><div id="boss-bar" style="width:100%"></div></div>

  <div style="position:relative;">
    <canvas id="canvas" width="480" height="580"></canvas>

    <div id="overlay">
      <div class="overlay-title" id="overlay-title">DODGE</div>
      <div class="overlay-sub" id="overlay-sub">SURVIVE THE GRID</div>
      <div class="overlay-score-label" id="overlay-score-label" style="display:none">FINAL SCORE</div>
      <div class="overlay-score-val" id="overlay-score-val" style="display:none">0</div>
      <div id="name-input-wrap">
        <label>ENTER YOUR NAME TO TRACK SCORES</label>
        <input id="player-name" maxlength="12" placeholder="PILOT" autocomplete="off" spellcheck="false"/>
      </div>
      <div id="leaderboard" style="display:none">
        <div id="leaderboard-title">TOP SCORES</div>
        <div id="lb-rows"></div>
      </div>
      <button id="start-btn">PLAY</button>
      <div id="tip">MOUSE or ARROW KEYS to move</div>
      <div id="tip2">🛡️ SHIELD - blocks one hit &nbsp;|&nbsp; ⏱️ SLOW-MO - halves speed</div>
    </div>

    <div id="level-flash"></div>
  </div>
</div>

<script>
// ─── CANVAS SETUP ───────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ─── AUDIO ──────────────────────────────────────────────────────────────────
let audioCtx = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, vol, freqEnd) {
  try {
    const ac = getAudio();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    if (freqEnd) osc.frequency.exponentialRampToValueAtTime(freqEnd, ac.currentTime + duration);
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(); osc.stop(ac.currentTime + duration);
  } catch(e) {}
}

const SFX = {
  hit:      () => { playTone(200, 'sawtooth', 0.25, 0.3, 30); },
  die:      () => { playTone(300, 'sawtooth', 0.6, 0.4, 20); playTone(150, 'square', 0.4, 0.2, 40); },
  powerup:  () => { playTone(440, 'sine', 0.08, 0.2); playTone(660, 'sine', 0.12, 0.2); playTone(880, 'sine', 0.18, 0.2); },
  shield:   () => { playTone(600, 'sine', 0.15, 0.25, 900); },
  levelup:  () => { playTone(330, 'square', 0.1, 0.15); playTone(440, 'square', 0.1, 0.15); playTone(550, 'square', 0.15, 0.15); },
  boss:     () => { playTone(80, 'sawtooth', 0.8, 0.35, 60); playTone(60, 'square', 0.5, 0.2, 50); },
  bossdie:  () => { playTone(500, 'sawtooth', 0.05, 0.3); playTone(400, 'sawtooth', 0.05, 0.3); playTone(300, 'sawtooth', 0.05, 0.3); playTone(200, 'sawtooth', 0.4, 0.3, 50); },
  dodge:    () => { if (Math.random() > 0.94) playTone(880, 'sine', 0.04, 0.05, 1200); }
};

// ─── LEADERBOARD ────────────────────────────────────────────────────────────
const LB_KEY = 'dodge_leaderboard_v1';

function loadLB() {
  try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; } catch(e) { return []; }
}

function saveLB(entries) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(entries)); } catch(e) {}
}

function addToLB(name, score) {
  const entries = loadLB();
  entries.push({ name: (name || 'PILOT').toUpperCase().slice(0,12), score });
  entries.sort((a,b) => b.score - a.score);
  const trimmed = entries.slice(0, 8);
  saveLB(trimmed);
  return trimmed;
}

function renderLB(entries, newScore) {
  const container = document.getElementById('lb-rows');
  container.innerHTML = '';
  entries.forEach((e, i) => {
    const row = document.createElement('div');
    row.className = 'lb-row' + (i === 0 ? ' gold' : '') + (e.score === newScore && i === entries.findIndex(x => x.score === newScore) ? ' new-entry' : '');
    row.innerHTML = `<span>${i+1}. ${e.name}</span><span>${e.score}</span>`;
    container.appendChild(row);
  });
}

// ─── GAME STATE ─────────────────────────────────────────────────────────────
let state = 'idle';
let score = 0, lives = 3, frame = 0, animId = null;
let lastLevel = 1;

// Player
const P = { x: W/2, y: H - 80, w: 28, h: 16, speed: 5 };
let mx = W/2, my = H - 80;
let keys = {};

// Power-ups
let shieldActive = false, shieldTimer = 0;
let slowActive = false, slowTimer = 0;
let powerups = []; // dropped pickups on field

// Obstacles
let obstacles = [];
let baseSpeed = 2.8;
let spawnRate = 38;

// Boss
let bossActive = false;
let boss = null;
let bossHP = 0, bossMaxHP = 0;
let bossWaveLevel = 0; // which level triggered boss

// Particles
let particles = [];

// Stars
let stars = Array.from({length: 60}, () => ({
  x: Math.random()*W, y: Math.random()*H,
  r: Math.random()*1.5+0.3, s: Math.random()*0.4+0.1
}));
let gridOffset = 0;

// ─── HELPERS ────────────────────────────────────────────────────────────────
function getLevel() { return Math.floor(score / 250) + 1; }
function getSpeedMult() { return slowActive ? 0.45 : 1; }
function getObstacleSpeed() { return (baseSpeed + (getLevel()-1)*0.45) * getSpeedMult(); }
function getSpawnRate() { return Math.max(15, spawnRate - (getLevel()-1)*3); } // always spawns, even during boss
function isBossLevel(lvl) { return lvl >= 6 && (lvl - 6) % 4 === 0; } // boss at 6, 10, 14...

// ─── INPUT ───────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mx = e.clientX - r.left; my = e.clientY - r.top;
});
document.addEventListener('keydown', e => { keys[e.key] = true; });
document.addEventListener('keyup', e => { keys[e.key] = false; });
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('player-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

// ─── START / RESET ───────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; frame = 0; lastLevel = 1;
  obstacles = []; particles = []; powerups = [];
  shieldActive = false; shieldTimer = 0;
  slowActive = false; slowTimer = 0;
  bossActive = false; boss = null; bossWaveLevel = 0;
  P.x = W/2; P.y = H-80; mx = W/2;
  document.getElementById('boss-bar-wrap').classList.remove('visible');
  document.getElementById('boss-label').classList.remove('visible');
  // Reset overlay title for next game over
  document.getElementById('overlay-title').textContent = 'DODGE';
  document.getElementById('overlay-title').style.color = 'var(--accent)';
  document.getElementById('overlay-title').style.textShadow = '0 0 40px var(--accent), 0 0 80px rgba(0,255,231,0.3)';
  document.getElementById('overlay-score-label').style.display='none';
  document.getElementById('overlay-score-val').style.display='none';
  updateHUD(); updatePowerupUI();
  document.getElementById('overlay').classList.add('hidden');
  state = 'playing';
  if (animId) cancelAnimationFrame(animId);
  loop();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = score;
  ['pip1','pip2','pip3'].forEach((id,i) => {
    document.getElementById(id).classList.toggle('dead', i >= lives);
  });
}

function updatePowerupUI() {
  document.getElementById('pu-shield').classList.toggle('active', shieldActive);
  document.getElementById('pu-slow').classList.toggle('active', slowActive);
}

function showLevelFlash(text, color) {
  const el = document.getElementById('level-flash');
  el.textContent = text;
  el.style.color = color || 'var(--warn)';
  el.style.textShadow = `0 0 30px ${color || 'var(--warn)'}`;
  el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}

// ─── SPAWNING ────────────────────────────────────────────────────────────────
function spawnObstacle() {
  const types = ['rect','diamond','bar'];
  const t = types[Math.floor(Math.random()*types.length)];
  const w = t==='bar' ? (60+Math.random()*80) : (18+Math.random()*22);
  const h = t==='bar' ? 12 : (18+Math.random()*22);
  obstacles.push({
    x: Math.random()*(W-w-20)+10, y: -h-10, w, h,
    type: t,
    speed: getObstacleSpeed() * (0.85+Math.random()*0.4),
    hue: Math.random()>0.3 ? 0 : 45
  });
}

function spawnPowerup(x, y) {
  const type = Math.random() > 0.5 ? 'shield' : 'slow';
  powerups.push({ x, y, type, vy: 1.2, life: 420, r: 14 });
}

function spawnParticles(x, y, color, n=12) {
  for (let i=0; i<n; i++) {
    const angle = (Math.PI*2*i)/n + Math.random()*0.4;
    const spd = 2+Math.random()*4;
    particles.push({
      x, y, vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
      life: 1, decay: 0.04+Math.random()*0.04,
      r: 2+Math.random()*3, color
    });
  }
}

// ─── BOSS ────────────────────────────────────────────────────────────────────
function getBossWaveNum(level) {
  // Boss at levels 6, 10, 14... so wave num 1, 2, 3...
  return Math.floor((level - 6) / 4) + 1;
}

function spawnBoss(level) {
  bossActive = true;
  const waveNum = getBossWaveNum(level);
  bossHP = bossMaxHP = 6 + waveNum * 3;
  boss = {
    x: W/2 - 40, y: 60, w: 80 + waveNum * 6, h: 30 + waveNum * 4,
    vx: 1.8 + waveNum * 0.9,
    vy: 0,
    phase: 0, shootTimer: 0,
    waveNum,
    projectiles: []
  };
  // obstacles keep going - no clear
  document.getElementById('boss-bar-wrap').classList.add('visible');
  document.getElementById('boss-label').classList.add('visible');
  document.getElementById('boss-label').textContent = waveNum >= 3 ? `⚠ BOSS WAVE ${waveNum} — ELITE` : `⚠ BOSS WAVE ${waveNum}`;
  SFX.boss();
  showLevelFlash(waveNum >= 3 ? 'ELITE BOSS!' : `BOSS WAVE ${waveNum}!`, '#ff2d55');
}

function updateBoss() {
  if (!boss) return;
  boss.x += boss.vx * getSpeedMult();
  if (boss.x <= 0 || boss.x + boss.w >= W) { boss.vx *= -1; boss.x = Math.max(0, Math.min(W-boss.w, boss.x)); }

  // Sine weave
  boss.phase += 0.03;
  boss.y = 60 + Math.sin(boss.phase) * 20;

  // Shoot projectiles
  boss.shootTimer++;
  const waveNum = boss.waveNum || 1;
  const shootInterval = Math.max(20, 60 - waveNum * 8);
  if (boss.shootTimer >= shootInterval) {
    boss.shootTimer = 0;
    const cx = boss.x + boss.w/2;
    const numShots = Math.min(5, 1 + waveNum);
    const spread = 0.28;
    const angles = Array.from({length: numShots}, (_,i) => Math.PI/2 + (i - (numShots-1)/2) * spread);
    const projSpeed = (2.5 + waveNum * 0.6) * getSpeedMult();
    angles.forEach(a => {
      boss.projectiles.push({ x: cx, y: boss.y + boss.h, vx: Math.cos(a) * projSpeed * 0.4, vy: Math.sin(a) * projSpeed, r: 7 });
    });
  }

  // Update projectiles
  boss.projectiles = boss.projectiles.filter(p => {
    p.x += p.vx; p.y += p.vy;
    // Collision with player
    if (state === 'playing') {
      const dx = p.x - P.x, dy = p.y - P.y;
      if (Math.sqrt(dx*dx+dy*dy) < p.r + 8) {
        handlePlayerHit();
        return false;
      }
    }
    return p.y < H + 20;
  });

  // Boss health bar
  document.getElementById('boss-bar').style.width = (bossHP/bossMaxHP*100)+'%';

  // Collision boss body with player
  if (state === 'playing') {
    if (P.x+P.w/2 > boss.x && P.x-P.w/2 < boss.x+boss.w &&
        P.y+P.h/2 > boss.y && P.y-P.h/2 < boss.y+boss.h) {
      handlePlayerHit();
    }
  }
}

function drawBoss() {
  if (!boss) return;
  // Body
  const pulse = 0.75 + Math.sin(frame*0.12)*0.25;
  ctx.fillStyle = `rgba(255,45,85,${pulse})`;
  ctx.shadowColor = '#ff2d55'; ctx.shadowBlur = 20;
  ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
  // Eye
  ctx.fillStyle = '#fff'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(boss.x+boss.w/2, boss.y+boss.h/2, 8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff2d55';
  ctx.beginPath(); ctx.arc(boss.x+boss.w/2, boss.y+boss.h/2, 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  // Projectiles
  boss.projectiles.forEach(p => {
    ctx.fillStyle = '#ff8c00'; ctx.shadowColor = '#ff8c00'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function damageBoss() {
  bossHP--;
  spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#ff2d55', 8);
  if (bossHP <= 0) {
    SFX.bossdie();
    spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#ff2d55', 40);
    spawnParticles(boss.x+boss.w/2, boss.y+boss.h/2, '#ffcc00', 30);
    score += 300;
    spawnPowerup(boss.x+boss.w/2, boss.y+boss.h);
    boss = null; bossActive = false;
    document.getElementById('boss-bar-wrap').classList.remove('visible');
    document.getElementById('boss-label').classList.remove('visible');
    showLevelFlash('BOSS DEFEATED! +300', '#00ffe7');
  }
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function checkAABB(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function handlePlayerHit() {
  if (shieldActive) {
    shieldActive = false; shieldTimer = 0;
    updatePowerupUI();
    SFX.shield();
    spawnParticles(P.x, P.y, '#4488ff', 20);
    return;
  }
  lives--;
  SFX.hit();
  spawnParticles(P.x, P.y, '#ff2d55', 16);
  updateHUD();
  if (lives <= 0) {
    state = 'dead';
    SFX.die();
    spawnParticles(P.x, P.y, '#ff2d55', 35);
    setTimeout(showGameOver, 800);
  }
}

// ─── PICKUP COLLISION ────────────────────────────────────────────────────────
function checkPickup(pu) {
  const dx = pu.x - P.x, dy = pu.y - P.y;
  return Math.sqrt(dx*dx+dy*dy) < pu.r + 16;
}

// ─── MAIN LOOP ───────────────────────────────────────────────────────────────
function loop() {
  animId = requestAnimationFrame(loop);
  frame++;

  // Background
  ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0,0,W,H);

  // Grid (speed-scrolling)
  gridOffset = (gridOffset + getObstacleSpeed()*0.3) % 40;
  ctx.strokeStyle = slowActive ? '#0e1a1a' : '#12121e';
  ctx.lineWidth = 1;
  for (let y=-40+gridOffset; y<H+40; y+=40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  for (let x=0; x<W; x+=40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }

  // Slow-mo tint
  if (slowActive) {
    ctx.fillStyle = 'rgba(80,0,180,0.06)'; ctx.fillRect(0,0,W,H);
  }

  // Stars
  stars.forEach(s => {
    s.y += s.s * (slowActive ? 0.3 : 1);
    if (s.y > H) { s.y=-2; s.x=Math.random()*W; }
    ctx.fillStyle = `rgba(200,200,255,${0.3+s.r*0.2})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });

  if (state === 'playing') {
    // ── Power-up timers
    if (shieldTimer > 0) { shieldTimer--; if (shieldTimer===0) { shieldActive=false; updatePowerupUI(); } }
    if (slowTimer > 0)   { slowTimer--;   if (slowTimer===0)   { slowActive=false;   updatePowerupUI(); } }

    // ── Player movement
    const dx=mx-P.x, dy=my-P.y, dist=Math.sqrt(dx*dx+dy*dy);
    if (dist>4) { P.x+=(dx/dist)*Math.min(dist,P.speed*1.4); P.y+=(dy/dist)*Math.min(dist,P.speed*1.4); }
    if (keys['ArrowLeft']||keys['a'])  P.x-=P.speed;
    if (keys['ArrowRight']||keys['d']) P.x+=P.speed;
    if (keys['ArrowUp']||keys['w'])    P.y-=P.speed;
    if (keys['ArrowDown']||keys['s'])  P.y+=P.speed;
    P.x=Math.max(P.w/2,Math.min(W-P.w/2,P.x));
    P.y=Math.max(P.h/2,Math.min(H-P.h/2,P.y));

    // ── Spawn (always, even during boss waves)
    if (frame%getSpawnRate()===0) spawnObstacle();

    // ── Score
    score++;
    updateHUD();
    SFX.dodge();

    // ── Level up
    const lvl = getLevel();
    if (lvl > lastLevel) {
      lastLevel = lvl;
      if (isBossLevel(lvl) && !bossActive) {
        spawnBoss(lvl);
      } else {
        SFX.levelup();
        showLevelFlash(`LEVEL ${lvl}`, '#ffcc00');
      }
    }

    // ── Boss
    if (bossActive && boss) updateBoss();
  }

  // ── Draw obstacles
  obstacles = obstacles.filter(obs => {
    obs.y += obs.speed * getSpeedMult();
    ctx.shadowBlur = 12;
    if (obs.hue===0) { ctx.fillStyle=`rgba(255,45,85,0.9)`; ctx.shadowColor='#ff2d55'; }
    else             { ctx.fillStyle=`rgba(255,200,0,0.9)`;  ctx.shadowColor='#ffcc00'; }
    if (obs.type==='diamond') {
      ctx.save(); ctx.translate(obs.x+obs.w/2,obs.y+obs.h/2); ctx.rotate(Math.PI/4);
      ctx.fillRect(-obs.w*0.35,-obs.h*0.35,obs.w*0.7,obs.h*0.7); ctx.restore();
    } else { ctx.fillRect(obs.x,obs.y,obs.w,obs.h); }
    ctx.shadowBlur=0;
    // Collision
    const pw=P.w*0.7,ph=P.h*0.7;
    if (state==='playing' && checkAABB(P.x-pw/2,P.y-ph/2,pw,ph,obs.x,obs.y,obs.w,obs.h)) {
      handlePlayerHit(); return false;
    }
    return obs.y < H+20;
  });

  // ── Boss
  if (bossActive && boss) drawBoss();

  // ── Powerup pickups
  powerups = powerups.filter(pu => {
    pu.y += pu.vy; pu.life--;
    const alpha = Math.min(1, pu.life/60);
    const col = pu.type==='shield' ? '#4488ff' : '#aa44ff';
    ctx.shadowColor = col; ctx.shadowBlur = 14;
    ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.globalAlpha = alpha;
    ctx.beginPath(); ctx.arc(pu.x, pu.y, pu.r, 0, Math.PI*2); ctx.stroke();
    ctx.font = '14px serif';
    ctx.fillStyle = col;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(pu.type==='shield' ? '🛡️' : '⏱️', pu.x, pu.y);
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    // Pickup check
    if (state==='playing' && checkPickup(pu)) {
      SFX.powerup();
      if (pu.type==='shield') { shieldActive=true; shieldTimer=600; }
      else                    { slowActive=true;   slowTimer=480;   }
      updatePowerupUI();
      spawnParticles(pu.x, pu.y, col, 14);
      showLevelFlash(pu.type==='shield' ? 'SHIELD!' : 'SLOW-MO!', col);
      return false;
    }
    return pu.life > 0 && pu.y < H+20;
  });

  // ── Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=p.decay;
    ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    return p.life>0;
  });

  // ── Player ship
  if (state!=='dead' || frame%6<4) {
    const px=P.x, py=P.y;
    // Shield bubble
    if (shieldActive) {
      const shieldPulse = 0.5+Math.sin(frame*0.15)*0.3;
      ctx.strokeStyle=`rgba(68,136,255,${shieldPulse})`; ctx.lineWidth=2;
      ctx.shadowColor='#4488ff'; ctx.shadowBlur=20;
      ctx.beginPath(); ctx.arc(px,py,26,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
    }
    ctx.shadowColor='#00ffe7'; ctx.shadowBlur=20; ctx.fillStyle='#00ffe7';
    ctx.beginPath();
    ctx.moveTo(px,py-P.h/2-4);
    ctx.lineTo(px-P.w/2,py+P.h/2);
    ctx.lineTo(px-P.w/4,py+P.h/4);
    ctx.lineTo(px,py+P.h/2-6);
    ctx.lineTo(px+P.w/4,py+P.h/4);
    ctx.lineTo(px+P.w/2,py+P.h/2);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#fff'; ctx.shadowBlur=8;
    ctx.beginPath(); ctx.ellipse(px,py-2,4,6,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=`rgba(0,255,231,${0.3+Math.sin(frame*0.3)*0.2})`;
    ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(px-5,py+P.h/2);
    ctx.lineTo(px,py+P.h/2+6+Math.sin(frame*0.5)*4);
    ctx.lineTo(px+5,py+P.h/2);
    ctx.stroke();
  }

  // ── Cursor
  if (state==='playing') {
    ctx.strokeStyle='rgba(0,255,231,0.35)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(mx,my,10,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(0,255,231,0.8)';
    ctx.beginPath(); ctx.arc(mx,my,2,0,Math.PI*2); ctx.fill();
  }
}

// ─── GAME OVER ────────────────────────────────────────────────────────────────
function showGameOver() {
  const playerName = document.getElementById('player-name').value || 'PILOT';
  // Remember name for next session
  try { localStorage.setItem('dodge_pilot_name', playerName); } catch(e) {}
  const entries = addToLB(playerName, score);

  const overlay = document.getElementById('overlay');
  document.getElementById('overlay-title').textContent = 'GAME OVER';
  document.getElementById('overlay-title').style.color = '#ff2d55';
  document.getElementById('overlay-title').style.textShadow = '0 0 40px #ff2d55';
  document.getElementById('overlay-sub').textContent = 'YOUR SHIP WAS DESTROYED';
  document.getElementById('overlay-score-label').style.display='block';
  document.getElementById('overlay-score-val').style.display='block';
  document.getElementById('overlay-score-val').textContent=score;
  document.getElementById('name-input-wrap').style.display='flex';
  document.getElementById('leaderboard').style.display='block';
  document.getElementById('start-btn').textContent='PLAY AGAIN';
  renderLB(entries, score);
  overlay.classList.remove('hidden');
}

// ─── IDLE LOOP ────────────────────────────────────────────────────────────────
function idleLoop() {
  if (state !== 'idle') return;
  ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#12121e'; ctx.lineWidth=1;
  for (let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for (let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  stars.forEach(s=>{
    s.y+=s.s*0.5; if(s.y>H){s.y=-2;s.x=Math.random()*W;}
    ctx.fillStyle=`rgba(200,200,255,${0.3+s.r*0.2})`;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  requestAnimationFrame(idleLoop);
}
idleLoop();

// Restore saved pilot name
try {
  const savedName = localStorage.getItem('dodge_pilot_name');
  if (savedName) document.getElementById('player-name').value = savedName;
} catch(e) {}

// Show existing leaderboard on load
const existing = loadLB();
if (existing.length > 0) {
  document.getElementById('leaderboard').style.display='block';
  renderLB(existing, -1);
}
</script>
